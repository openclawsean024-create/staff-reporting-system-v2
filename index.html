<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>駐點回報系統 V2</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --bg: #fbfbfd;
            --card-bg: #ffffff;
            --border: #d2d2d7;
            --accent: #34c759;
            --danger: #ff3b30;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 480px; margin: 0 auto; }

        .header {
            text-align: center;
            padding: 24px 0 32px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.004em;
        }

        .header .user-info {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 17px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
        }

        .btn {
            padding: 18px 24px;
            border: none;
            border-radius: 980px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: #a0c0e0; cursor: not-allowed; }

        .btn-secondary {
            background: rgba(0,0,0,0.05);
            color: var(--primary);
        }

        .btn-secondary:hover { background: rgba(0,0,0,0.1); }

        .scanner-container {
            display: none;
            margin-bottom: 15px;
        }

        .scanner-container.active { display: block; }

        #scanner-wrapper {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        .scanner-close {
            display: block;
            width: 100%;
            padding: 12px;
            background: rgba(255,107,107,0.2);
            border: none;
            color: var(--danger);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 8px;
            font-family: inherit;
        }

        .product-info {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }

        .product-info.show { display: block; }

        .product-info h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        .info-row:last-child { border-bottom: none; }
        .info-label { color: #6b7280; }
        .info-value { color: #1f2937; font-weight: 500; }

        #reportForm { display: none; }
        #reportForm.active { display: block; }

        .history-item {
            background: #f9fafb;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #e5e7eb;
        }

        .history-item .pn {
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
        }

        .history-item .time {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .logout-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: var(--danger);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        .hidden { display: none !important; }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0,113,227,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading { text-align: center; padding: 20px; color: #888; font-size: 14px; }

        .msg {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 12px;
            text-align: center;
        }

        .msg-error { background: #fee2e2; color: var(--danger); }
        .msg-success { background: #d1fae5; color: #065f46; }

        #searchResults {
            display: none;
            max-height: 200px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            margin-top: 5px;
        }

        #searchResults > div {
            padding: 10px;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
            font-size: 14px;
        }

        #searchResults > div:hover { background: #f0f7ff; }
        #searchResults > div:last-child { border-bottom: none; }

        .result-message { text-align: center; padding: 40px 20px; }
        .result-message .icon { font-size: 56px; margin-bottom: 16px; }
        .result-message h3 { font-size: 22px; margin-bottom: 10px; }
        .result-message p { color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>
    <button class="logout-btn hidden" id="logoutBtn" onclick="logout()">登出</button>

    <div class="container">
        <div class="header">
            <h1>📋 駐點回報系統 V2</h1>
            <div class="user-info hidden" id="userInfo">
                👤 <span id="displayName"></span> / <span id="displayStore"></span>
            </div>
        </div>

        <!-- Login Form -->
        <div class="card" id="loginForm">
            <div class="card-title">登入 Login</div>

            <div class="form-group">
                <label>姓名 Name</label>
                <input type="text" id="loginName" placeholder="請輸入您的姓名" autocomplete="off">
            </div>

            <div class="form-group">
                <label>店名 Store</label>
                <input type="text" id="loginStore" placeholder="請輸入店名" autocomplete="off">
            </div>

            <div id="loginError" class="msg msg-error hidden"></div>

            <button class="btn btn-primary" onclick="login()">進入系統 Enter</button>
        </div>

        <!-- Report Form -->
        <div class="card" id="reportForm">
            <div class="card-title">產品回報 Product Report</div>

            <!-- PN Code Search -->
            <div class="form-group">
                <label>PN 碼</label>
                <input type="text" id="productPN" placeholder="請輸入或掃描 PN 碼" autocomplete="off">
                <div id="searchResults"></div>
            </div>

            <button class="btn btn-secondary" style="margin-bottom:15px" onclick="searchProduct()">查詢 Query</button>

            <!-- Product Info -->
            <div class="product-info" id="productInfo">
                <h4>產品資訊 Product Info</h4>
                <div class="info-row">
                    <span class="info-label">PN 碼</span>
                    <span class="info-value" id="infoPN">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">產品名稱</span>
                    <span class="info-value" id="infoName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">規格</span>
                    <span class="info-value" id="infoSpec">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">類別</span>
                    <span class="info-value" id="infoCategory">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">價格</span>
                    <span class="info-value" id="infoPrice">-</span>
                </div>
            </div>

            <div id="submitError" class="msg msg-error hidden"></div>

            <button class="btn btn-primary" id="submitBtn" onclick="submitReport()">提交回報 Submit</button>

            <!-- Today's Records -->
            <div style="margin-top:28px">
                <div class="card-title">今日回報記錄 Today's Records</div>
                <div id="historyList">
                    <p class="loading"><span class="spinner"></span>載入中...</p>
                </div>
            </div>
        </div>

        <!-- Success -->
        <div class="card hidden" id="successResult">
            <div class="result-message">
                <div class="icon">✅</div>
                <h3>提交成功！</h3>
                <p>您的回報已送出，感謝您的協助！</p>
                <button class="btn btn-primary" style="margin-top:24px" onclick="resetForm()">繼續回報 Continue</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Config ====================
        const API_BASE = location.origin;

        // ==================== State ====================
        let currentUser = null;
        let selectedProduct = null;
        let productsCache = [];

        // ==================== Init ====================
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            loadProducts();
        });

        // ==================== Products ====================
        async function loadProducts() {
            try {
                const res = await fetch(`${API_BASE}/api/products`);
                if (res.ok) {
                    productsCache = await res.json();
                }
            } catch (e) {
                productsCache = [];
            }
        }

        // ==================== Login ====================
        function login() {
            const name = document.getElementById('loginName').value.trim();
            const store = document.getElementById('loginStore').value.trim();
            const errEl = document.getElementById('loginError');

            if (!name) {
                errEl.textContent = '請填寫姓名';
                errEl.classList.remove('hidden');
                return;
            }
            if (!store) {
                errEl.textContent = '請填寫店名';
                errEl.classList.remove('hidden');
                return;
            }

            errEl.classList.add('hidden');
            currentUser = { name, store };

            localStorage.setItem('staffreport_v2_user', JSON.stringify(currentUser));
            showMainForm();
            loadRecords();
        }

        function checkLoginStatus() {
            const saved = localStorage.getItem('staffreport_v2_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                showMainForm();
                loadRecords();
            }
        }

        function logout() {
            if (confirm('確定要登出嗎？')) {
                localStorage.removeItem('staffreport_v2_user');
                location.reload();
            }
        }

        function showMainForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('reportForm').classList.add('active');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            document.getElementById('displayName').textContent = currentUser.name;
            document.getElementById('displayStore').textContent = currentUser.store;
        }

        // ==================== Product Search ====================
        document.getElementById('productPN').addEventListener('input', function () {
            const q = this.value.trim().toUpperCase();
            const resultsEl = document.getElementById('searchResults');

            if (!q) {
                resultsEl.style.display = 'none';
                return;
            }

            const matches = productsCache.filter(p =>
                p.pn.toUpperCase().includes(q) ||
                (p.name && p.name.toUpperCase().includes(q))
            );

            if (matches.length === 0) {
                resultsEl.innerHTML = '<div style="color:#888;pointer:none;">找不到符合的產品</div>';
            } else {
                resultsEl.innerHTML = matches.slice(0, 10).map(p =>
                    `<div onclick="selectProduct('${p.pn}')">${p.pn} — ${p.name || '-'}</div>`
                ).join('');
            }

            resultsEl.style.display = 'block';
        });

        function selectProduct(pn) {
            document.getElementById('productPN').value = pn;
            document.getElementById('searchResults').style.display = 'none';
            searchProduct();
        }

        function searchProduct() {
            const pn = document.getElementById('productPN').value.trim().toUpperCase();
            const errEl = document.getElementById('submitError');
            errEl.classList.add('hidden');

            if (!pn) {
                errEl.textContent = '請先輸入 PN 碼';
                errEl.classList.remove('hidden');
                return;
            }

            const product = productsCache.find(p => p.pn.toUpperCase() === pn);

            if (!product) {
                errEl.textContent = '查無此產品，請確認 PN 碼是否正確';
                errEl.classList.remove('hidden');
                selectedProduct = null;
                document.getElementById('productInfo').classList.remove('show');
                return;
            }

            selectedProduct = product;
            document.getElementById('infoPN').textContent = product.pn;
            document.getElementById('infoName').textContent = product.name || '-';
            document.getElementById('infoSpec').textContent = product.spec || '-';
            document.getElementById('infoCategory').textContent = product.category || '-';
            document.getElementById('infoPrice').textContent = product.price ? `$${Number(product.price).toLocaleString()}` : '-';
            document.getElementById('productInfo').classList.add('show');
        }

        // ==================== Submit ====================
        async function submitReport() {
            const errEl = document.getElementById('submitError');
            errEl.classList.add('hidden');

            if (!selectedProduct) {
                errEl.textContent = '請先查詢產品';
                errEl.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                const res = await fetch(`${API_BASE}/api/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: currentUser.name,
                        store: currentUser.store,
                        pnCode: selectedProduct.pn,
                        productInfo: selectedProduct,
                    }),
                });

                const data = await res.json();

                if (!res.ok || !data.success) {
                    errEl.textContent = data.message || '提交失敗，請稍後再試';
                    errEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = '提交回報 Submit';
                    return;
                }

                // Show success
                document.getElementById('reportForm').classList.remove('active');
                document.getElementById('successResult').classList.remove('hidden');

                // Reload records
                loadRecords();

            } catch (e) {
                errEl.textContent = '網路錯誤，請稍後再試';
                errEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = '提交回報 Submit';
            }
        }

        // ==================== Records ====================
        async function loadRecords() {
            if (!currentUser) return;

            const today = new Date().toISOString().split('T')[0];
            const listEl = document.getElementById('historyList');

            try {
                const res = await fetch(
                    `${API_BASE}/api/records?name=${encodeURIComponent(currentUser.name)}&date=${today}`
                );
                const data = await res.json();

                if (data.reports && data.reports.length > 0) {
                    listEl.innerHTML = data.reports
                        .sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt))
                        .map(r => `
                            <div class="history-item">
                                <div class="pn">${r.pnCode} — ${(r.productInfo && r.productInfo.name) ? r.productInfo.name : '-'}</div>
                                <div class="time">${new Date(r.submittedAt).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' })}</div>
                            </div>
                        `).join('');
                } else {
                    listEl.innerHTML = '<p style="text-align:center;color:#888;font-size:13px;padding:12px;">尚無回報記錄 No records yet</p>';
                }
            } catch (e) {
                listEl.innerHTML = '<p style="text-align:center;color:#888;font-size:13px;padding:12px;">尚無回報記錄 No records yet</p>';
            }
        }

        // ==================== Reset ====================
        function resetForm() {
            document.getElementById('productPN').value = '';
            document.getElementById('productInfo').classList.remove('show');
            selectedProduct = null;
            document.getElementById('successResult').classList.add('hidden');
            document.getElementById('reportForm').classList.add('active');
        }
    </script>
</body>
</html>
